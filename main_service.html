<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기부지도 - 서비스페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="p-6 bg-white shadow-sm flex justify-between items-center sticky top-0 z-50"> 
        <a href="/" class="hover:opacity-80 transition-opacity">
            <h1 class="text-2xl font-bold text-blue-600">Donation Map</h1>
        </a>
        <a href="main_service.html" 
            class="inline-block px-6 py-2 bg-blue-600 text-white font-bold rounded-2xl shadow-lg hover:bg-blue-700 transition-all duration-300 text-sm">
            기부 지도 보러가기
        </a>
    </nav>

    <main class="max-w-6xl mx-auto mt-12 px-4 mb-20">
        <header class="mb-10">
            <h2 class="text-3xl font-extrabold mb-2 text-gray-900">기부처 찾기</h2>
            <p class="text-gray-600 text-lg">1시간마다 업데이트되는 공개 캠페인 데이터를 한 곳에서 탐색합니다.</p>
        </header>

        <section class="bg-white border border-gray-100 rounded-2xl shadow-sm p-5 mb-8">
            <div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="q">검색</label>
                    <input id="q" type="text" placeholder="제목/단체/태그로 검색" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-200" />
                </div>
                <div class="w-full md:w-64">
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="category">카테고리</label>
                    <select id="category" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">
                        <option value="">전체</option>
                    </select>
                </div>
                <div class="w-full md:w-56">
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="source">플랫폼</label>
                    <select id="source" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">
                        <option value="">전체</option>
                        <option value="kakao">Kakao Together</option>
                        <option value="goodneighbors">GoodNeighbors</option>
                        <option value="happybean">Naver Happybean</option>
                    </select>
                </div>
            </div>

            <div class="mt-4 flex flex-col md:flex-row md:items-center gap-2 md:gap-4">
                <div class="text-sm text-gray-500" id="meta"></div>
                <div class="md:ml-auto flex gap-2">
                    <button id="reset" class="px-4 py-2 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 text-sm font-semibold">초기화</button>
                    <button id="reload" class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold">새로고침</button>
                </div>
            </div>
        </section>

        <section>
            <div id="error" class="hidden mb-6 p-4 rounded-xl bg-red-50 border border-red-100 text-red-700"></div>
            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            <div id="empty" class="hidden text-center text-gray-500 py-16">조건에 맞는 캠페인이 없습니다.</div>
        </section>

    <footer class="bg-white border-t border-gray-100 py-12">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="text-gray-400 text-sm">© 2026 Donation Map Project. 세상을 바꾸는 작은 실천.</p>
        </div>
    </footer>

    <script>
        const el = (id) => document.getElementById(id);

        const state = {
            data: null,
            items: [],
            q: '',
            category: '',
            source: ''
        };

        function escapeHtml(s) {
            return String(s ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function formatKRW(n) {
            const v = Number(n);
            if (!Number.isFinite(v)) return '';
            return v.toLocaleString('ko-KR') + '원';
        }

        function chip(text) {
            return `<span class="px-2.5 py-1 rounded-full bg-gray-100 text-gray-700 text-xs font-semibold">${escapeHtml(text)}</span>`;
        }

        function renderCard(it) {
            const money = (it.amountCurrent != null || it.amountGoal != null) ? `${formatKRW(it.amountCurrent)} / ${formatKRW(it.amountGoal)}`.trim() : '';
            const pct = (it.progressPct != null) ? `${it.progressPct}%` : '';
            const period = (it.startDate || it.endDate) ? `${it.startDate || ''}${it.startDate && it.endDate ? ' ~ ' : ''}${it.endDate || ''}` : '';
            const tags = Array.isArray(it.tags) ? it.tags.slice(0, 6) : [];

            const img = it.image ? `<img src="${escapeHtml(it.image)}" alt="" class="w-full h-40 object-cover" loading="lazy" />` :
                `<div class="w-full h-40 bg-gradient-to-br from-blue-50 to-gray-50"></div>`;

            return `
                <article class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden hover:shadow-md transition-shadow">
                    ${img}
                    <div class="p-5">
                        <div class="flex items-center gap-2 mb-3">
                            ${chip(it.platform)}
                            ${it.category ? chip(it.category) : ''}
                        </div>
                        <h3 class="text-lg font-extrabold leading-snug text-gray-900 line-clamp-2">${escapeHtml(it.title)}</h3>
                        <p class="mt-2 text-sm text-gray-600 line-clamp-2">${escapeHtml(it.oneLineSummary || it.raw?.summaryRaw || '')}</p>
                        <div class="mt-3 text-sm text-gray-700">
                            <div class="font-semibold">${escapeHtml(it.org || '')}</div>
                            ${period ? `<div class="text-xs text-gray-500 mt-0.5">${escapeHtml(period)}</div>` : ''}
                        </div>

                        ${(money || pct) ? `
                            <div class="mt-4">
                                <div class="flex items-center justify-between text-xs text-gray-500 mb-1">
                                    <span>${escapeHtml(money)}</span>
                                    <span>${escapeHtml(pct)}</span>
                                </div>
                                <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                                    <div class="h-2 bg-blue-600" style="width:${Math.max(0, Math.min(100, Number(it.progressPct) || 0))}%"></div>
                                </div>
                            </div>
                        ` : ''}

                        ${tags.length ? `
                            <div class="mt-4 flex flex-wrap gap-2">
                                ${tags.map(t => `<span class="px-2.5 py-1 rounded-full bg-blue-50 text-blue-700 text-xs font-bold">${escapeHtml(t)}</span>`).join('')}
                            </div>
                        ` : ''}

                        <div class="mt-5 flex gap-2">
                            <a class="flex-1 text-center px-4 py-2 rounded-xl bg-gray-900 text-white font-bold text-sm hover:bg-black" href="${escapeHtml(it.link)}" target="_blank" rel="noreferrer">상세보기</a>
                            <a class="flex-1 text-center px-4 py-2 rounded-xl bg-blue-600 text-white font-bold text-sm hover:bg-blue-700" href="${escapeHtml(it.donateLink || it.link)}" target="_blank" rel="noreferrer">후원하기</a>
                        </div>
                    </div>
                </article>
            `;
        }

        function applyFilters() {
            const q = state.q.trim().toLowerCase();
            const cat = state.category;
            const src = state.source;

            const filtered = state.items.filter(it => {
                if (src && it.source !== src) return false;
                if (cat && it.category !== cat) return false;

                if (!q) return true;
                const hay = [
                    it.title,
                    it.org,
                    it.oneLineSummary,
                    it.platform,
                    it.category,
                    ...(Array.isArray(it.tags) ? it.tags : []),
                    it.raw?.titleRaw,
                    it.raw?.summaryRaw
                ].filter(Boolean).join(' ').toLowerCase();
                return hay.includes(q);
            });

            return filtered;
        }

        function render() {
            const grid = el('grid');
            const empty = el('empty');

            const filtered = applyFilters();
            grid.innerHTML = filtered.map(renderCard).join('');
            empty.classList.toggle('hidden', filtered.length !== 0);

            const meta = el('meta');
            const total = state.items.length;
            const showing = filtered.length;
            const gen = state.data?.generatedAt ? new Date(state.data.generatedAt).toLocaleString() : '';
            meta.textContent = `총 ${total.toLocaleString()}개 중 ${showing.toLocaleString()}개 표시${gen ? ` · 업데이트: ${gen}` : ''}`;
        }

        function populateCategoryOptions(items) {
            const sel = el('category');
            const cats = Array.from(new Set(items.map(it => it.category).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'ko'));
            const options = ['<option value="">전체</option>'].concat(cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`));
            sel.innerHTML = options.join('');
        }

        async function load() {
            el('error').classList.add('hidden');
            el('error').textContent = '';

            const res = await fetch('/api/campaigns', { cache: 'no-store' });
            if (!res.ok) {
                const txt = await res.text().catch(() => '');
                throw new Error(`API 오류: ${res.status} ${txt}`);
            }
            const j = await res.json();
            state.data = j;
            state.items = Array.isArray(j.items) ? j.items : [];
            populateCategoryOptions(state.items);
            render();
        }

        function wire() {
            el('q').addEventListener('input', (e) => {
                state.q = e.target.value;
                render();
            });
            el('category').addEventListener('change', (e) => {
                state.category = e.target.value;
                render();
            });
            el('source').addEventListener('change', (e) => {
                state.source = e.target.value;
                render();
            });
            el('reset').addEventListener('click', () => {
                state.q = '';
                state.category = '';
                state.source = '';
                el('q').value = '';
                el('category').value = '';
                el('source').value = '';
                render();
            });
            el('reload').addEventListener('click', async () => {
                try {
                    await load();
                } catch (err) {
                    const box = el('error');
                    box.textContent = String(err?.message || err);
                    box.classList.remove('hidden');
                }
            });
        }

        (async () => {
            wire();
            try {
                await load();
            } catch (err) {
                const box = el('error');
                box.textContent = String(err?.message || err);
                box.classList.remove('hidden');
            }
        })();
    </script>
</body>
</html>
